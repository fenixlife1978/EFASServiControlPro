name: Build Electron App
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Move API folders out of project
        run: |
          if (Test-Path src/app/api) {
            Move-Item -Path src/app/api -Destination ..\api_backup -Force
            Write-Host "API folder moved out"
          }
          if (Test-Path src/pages/api) {
            Move-Item -Path src/pages/api -Destination ..\pages_api_backup -Force
            Write-Host "Pages API folder moved out"
          }
        shell: pwsh

      - name: Build Next.js static files
        run: |
          $env:NEXT_PUBLIC_FIREBASE_API_KEY = "AIzaSyACK79dDRclgjFMEUokqpskC1ezyvmO11k"
          $env:NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN = "studio-7637044995-2342d.firebaseapp.com"
          $env:NEXT_PUBLIC_FIREBASE_PROJECT_ID = "studio-7637044995-2342d"
          $env:NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET = "studio-7637044995-2342d.firebasestorage.app"
          $env:NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID = "7637044995"
          $env:NEXT_PUBLIC_FIREBASE_APP_ID = "1:7637044995:web:2c6b412952864386927958"
          $env:NODE_ENV = "production"
          $env:IS_DESKTOP_BUILD = "true"
          npx next build
        shell: pwsh

      - name: Restore API folders
        run: |
          if (Test-Path ..\api_backup) {
            Move-Item -Path ..\api_backup -Destination src\app\api -Force
            Write-Host "API folder restored"
          }
          if (Test-Path ..\pages_api_backup) {
            Move-Item -Path ..\pages_api_backup -Destination src\pages\api -Force
            Write-Host "Pages API folder restored"
          }
        shell: pwsh

      - name: List out directory
        run: dir out
        shell: pwsh

      - name: Build Electron EXE
        run: npx electron-builder --win --publish never

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: EDUControlPro-Setup
          path: dist_electron/*.exe
