name: Build Electron App
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Hide API folders (to avoid static export errors)
        run: |
          if (Test-Path src/app/api) {
            Rename-Item -Path src/app/api -NewName "api_hidden" -Force
            Write-Host "API folder hidden"
          }
          if (Test-Path src/pages/api) {
            Rename-Item -Path src/pages/api -NewName "api_hidden" -Force
            Write-Host "Pages API folder hidden"
          }
        shell: pwsh

      - name: Build Next.js static files (export)
        run: |
          $env:NEXT_PUBLIC_FIREBASE_API_KEY = "AIzaSyACK79dDRclgjFMEUokqpskC1ezyvmO11k"
          $env:NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN = "studio-7637044995-2342d.firebaseapp.com"
          $env:NEXT_PUBLIC_FIREBASE_PROJECT_ID = "studio-7637044995-2342d"
          $env:NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET = "studio-7637044995-2342d.firebasestorage.app"
          $env:NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID = "7637044995"
          $env:NEXT_PUBLIC_FIREBASE_APP_ID = "1:7637044995:web:2c6b412952864386927958"
          $env:NODE_ENV = "production"
          $env:IS_DESKTOP_BUILD = "true"
          npx next build
        shell: pwsh

      - name: Restore API folders
        run: |
          if (Test-Path src/app/api_hidden) {
            Remove-Item -Path src/app/api -Recurse -Force -ErrorAction SilentlyContinue
            Rename-Item -Path src/app/api_hidden -NewName "api" -Force
            Write-Host "API folder restored"
          }
          if (Test-Path src/pages/api_hidden) {
            Remove-Item -Path src/pages/api -Recurse -Force -ErrorAction SilentlyContinue
            Rename-Item -Path src/pages/api_hidden -NewName "api" -Force
            Write-Host "Pages API folder restored"
          }
        shell: pwsh

      - name: List generated files (out folder)
        run: |
          Write-Host "Checking out folder:"
          if (Test-Path out) { dir out -Recurse } else { Write-Host "out folder not found" }
        shell: pwsh

      - name: Build Electron EXE
        run: npx electron-builder --win --publish never

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: EDUControlPro-Setup
          path: dist_electron/*.exe