apply plugin: 'com.android.application'

android {
    namespace "com.educontrolpro"
    compileSdk rootProject.ext.compileSdkVersion
    
    defaultConfig {
        applicationId "com.educontrolpro"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        
        aaptOptions {
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }

    packagingOptions {
        resources {
            excludes += [
                'META-INF/DEPENDENCIES', 
                'META-INF/LICENSE', 
                'META-INF/LICENSE.txt',
                'META-INF/NOTICE', 
                'META-INF/NOTICE.txt',
                'META-INF/INDEX.LIST',
                'META-INF/common.kotlin_module'
            ]
        }
        // Mantén esto si es necesario para otras librerías (puede ser opcional)
        pickFirst 'org/xbill/DNS/*'
    }
}

repositories {
    google()
    mavenCentral()
    flatDir {
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(dir: 'libs', include: ['*.jar'])

    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    
    // Firebase BOM
    implementation platform('com.google.firebase:firebase-bom:33.1.0')
    
    // Firestore
    implementation 'com.google.firebase:firebase-firestore'
    
    // Realtime Database
    implementation 'com.google.firebase:firebase-database'
    
    // Firebase Auth
    implementation 'com.google.firebase:firebase-auth'
    
    // Firebase Analytics
    implementation 'com.google.firebase:firebase-analytics'
    
    // OkHttp para WebSocket local (selector de base de datos)
    implementation 'com.squareup.okhttp3:okhttp:4.12.0'
    
    // ML Kit
    implementation 'com.google.mlkit:barcode-scanning:17.2.0'
    implementation 'com.google.android.gms:play-services-mlkit-barcode-scanning:18.3.0'

    // Unit Testing
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.exists()) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found")
}